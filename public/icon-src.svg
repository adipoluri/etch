<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7d1f33" />
      <stop offset="1" stop-color="#21121a" />
    </linearGradient>
  </defs>
  <!-- full-bleed background so the icon works as maskable -->
  <rect width="512" height="512" fill="url(#bg)" />
  <!-- sweeping "trace" stroke (kept within the maskable safe zone) -->
  <path
    d="M132 372 C 196 250, 300 248, 380 152"
    fill="none"
    stroke="#f3eceb"
    stroke-width="34"
    stroke-linecap="round"
  />
  <!-- accent underline echoing the stroke -->
  <path
    d="M150 392 C 214 286, 312 286, 372 196"
    fill="none"
    stroke="#c33a52"
    stroke-width="16"
    stroke-linecap="round"
    opacity="0.85"
  />
  <!-- nib dot -->
  <circle cx="380" cy="152" r="22" fill="#e0a44a" />
</svg>
